<!DOCTYPE html>
<html>

<head>

<title>Edit Expense</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>✏️ Edit Shared Expense</h1>

        {% if request.args.get('split_error') == 'no_members' %}
        <p>Please choose at least one person before saving the split.</p>
        {% endif %}

        <form
        action="/update_shared_expense/{{ expense[0] }}"
        method="POST">

            <input
                type="hidden"
                name="group_id"
                value="{{ expense[1] }}">

            <input
                type="text"
                name="description"
                value="{{ expense[2] }}"
                required>

            <input
                type="number"
                step="0.01"
                name="amount"
                value="{{ expense[3] }}"
                required>

            <select name="paid_by">

                {% for member in members %}

                <option
                {% if member[2] == expense[4] %}
                selected
                {% endif %}
                >
                    {{ member[2] }}
                </option>

                {% endfor %}

            </select>

            <div class="split-member-list">
                <h3>Split Between</h3>

                {% for member in members %}
                <label class="split-member-option">
                    <input
                        type="checkbox"
                        name="split_members"
                        value="{{ member[2] }}"
                        {% if member[2] in selected_split_members %}checked{% endif %}>
                    <span>{{ member[2] }}</span>
                </label>
                {% endfor %}
            </div>

            <button type="submit">
                Update Expense
            </button>

        </form>

    </div>

</div>

</body>
</html>
