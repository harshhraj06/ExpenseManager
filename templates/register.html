<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

    <img src="{{ url_for('static', filename='logo.png') }}" class="login-logo">

<h1>Expense Manager</h1>

<p class="hero-text">
Track smarter. Spend wiser. Build wealth every day.
</p>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="auth-link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</div>

</body>
</html>
