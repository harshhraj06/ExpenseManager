<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🔑 Forgot Password</h1>

        {% if message %}
        <p style="color:#16a34a;">{{ message }}</p>
        {% else %}

        <p>Enter your account email and we'll send you a link to reset your password.</p>

        <form action="/forgot_password" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        {% endif %}

        <p>
            <a href="/login">← Back to Login</a>
        </p>

    </div>

</div>

</body>
</html>
