<!DOCTYPE html>
<html>

<head>

    <title>Edit Income</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>✏️ Edit Income</h1>

        <form
        action="/update_income/{{ income[0] }}"
        method="POST">

            <input
                type="number"
                step="0.01"
                name="amount"
                value="{{ income[1] }}"
                required>

            <input
                type="text"
                name="source"
                value="{{ income[2] }}"
                required>

            <input
                type="date"
                name="date"
                value="{{ income[3] }}"
                required>

            <button type="submit">
                Update Income
            </button>

        </form>

        <p>
            <a href="/">⬅ Back to Dashboard</a>
        </p>

    </div>

</div>

</body>

</html>
